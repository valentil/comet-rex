<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comet Rex</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #stats-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="stats-panel">
        <div>FPS: <span id="fps-val">0</span></div>
        <div>Triangles: <span id="tri-val">0</span></div>
        <div>Draw Calls: <span id="draw-val">0</span></div>
        <div style="margin-top:5px; border-top:1px solid #444; padding-top:5px;">
            Top Geometries:
            <div id="top-geos"></div>
        </div>
        <div style="margin-top:5px; border-top:1px solid #444; padding-top:5px;">
            Debug:
            <div id="debug-info"></div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r17/stats.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
